<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Refract Rogue</title>
    <base href="./" />
    <link rel="stylesheet" href="./style.css?v=20260513-2" />
  </head>
  <body>
    <div class="game-shell" id="gameShell">
      <header class="hud">
        <div class="brand">
          <span class="brand-mark"></span>
          <span>Refract Rogue</span>
        </div>
        <div class="status-grid" aria-label="ゲーム状態">
          <div>
            <span class="status-label">WAVE</span>
            <strong id="waveText">1</strong>
          </div>
          <div>
            <span class="status-label">SCORE</span>
            <strong id="scoreText">0</strong>
          </div>
          <div>
            <span class="status-label">CORE</span>
            <strong id="hpText">5</strong>
          </div>
          <div>
            <span class="status-label">SHIFT</span>
            <strong id="laserTimerText">--</strong>
          </div>
        </div>
      </header>

      <main class="play-area" id="playArea">
        <section class="field" id="field" aria-label="敵フィールド">
          <div class="lane-grid" aria-hidden="true"></div>
          <div class="enemy-layer" id="enemyLayer"></div>
        </section>

        <section class="puzzle-panel" aria-label="屈折盤面">
          <div class="board" id="board"></div>
          <div class="emitter-row" id="emitterRow" aria-label="レーザー射出口"></div>
        </section>

        <svg class="laser-svg" id="laserSvg" aria-hidden="true">
          <polyline id="laserLine" points=""></polyline>
        </svg>
      </main>

      <footer class="control-bar">
        <div class="piece-bag" id="pieceBag" aria-label="所持ピース"></div>
        <button class="primary-button" type="button" id="pauseButton">PAUSE</button>
      </footer>

      <div class="overlay is-hidden" id="upgradeOverlay" role="dialog" aria-modal="true" aria-labelledby="upgradeTitle">
        <div class="upgrade-panel">
          <p class="eyebrow">ROGUE NODE</p>
          <h1 id="upgradeTitle">強化を選択</h1>
          <div class="upgrade-options" id="upgradeOptions"></div>
        </div>
      </div>

      <div class="overlay is-hidden" id="gameOverOverlay" role="dialog" aria-modal="true" aria-labelledby="gameOverTitle">
        <div class="upgrade-panel">
          <p class="eyebrow">CORE LOST</p>
          <h1 id="gameOverTitle">ゲームオーバー</h1>
          <p class="result-text" id="resultText"></p>
          <button class="primary-button wide" type="button" id="restartButton">RESTART</button>
        </div>
      </div>
    </div>

    <script src="./script.js?v=20260513-2"></script>
  </body>
</html>
